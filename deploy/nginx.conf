server {
    listen 443 ssl;
    http2 on;
    server_name markz.fun www.markz.fun;

    root /usr/share/nginx/blog;
    index index.html;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /jsonutils/admin {
        return 301 https://jsonutils.markz.fun/admin.html;
    }

    location ^~ /jsonutils/admin/ {
        return 301 https://jsonutils.markz.fun/admin.html;
    }

    location = /jsonutils {
        return 301 https://jsonutils.markz.fun/;
    }

    location ^~ /jsonutils/ {
        return 301 https://jsonutils.markz.fun/;
    }

    location = /zhangjihao {
        return 301 /zhangjihao/;
    }

    location ^~ /zhangjihao/ {
        alias /usr/share/nginx/zhangjihao/;
        index index.html;
        try_files $uri $uri/ /zhangjihao/index.html;
    }

    location = /notes {
        return 301 https://note.markz.fun/;
    }

    location ^~ /notes/ {
        rewrite ^/notes/(.*)$ https://note.markz.fun/$1 permanent;
    }

    location = /index.html {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf|json|xml)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}

