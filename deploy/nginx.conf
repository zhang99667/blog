map $request_method $markz_reaction_write_key {
    default "";
    POST $binary_remote_addr;
}

map $upstream_http_referrer_policy $markz_referrer_policy {
    default $upstream_http_referrer_policy;
    "" "strict-origin-when-cross-origin";
}

# The editorial hosts share one executable-resource policy. Product hosts stay
# empty here so their applications retain independent CSP ownership.
map $host $markz_content_security_policy {
    default "";
    ~^(?:(?:www\.)?markz\.fun|note\.markz\.fun)$ "default-src 'self'; base-uri 'none'; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; img-src 'self' data: https://note.markz.fun; manifest-src 'self'; media-src 'self'; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self'";
}

limit_req_zone $markz_reaction_write_key zone=markz_reaction_writes:1m rate=10r/m;

server {
    listen 80;
    server_name markz.fun www.markz.fun note.markz.fun jsonutils.markz.fun admin.markz.fun zhangjihao.markz.fun;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.markz.fun;

    root /usr/share/nginx/html;
    index admin.html;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/conf.d/security-headers.inc;

    location = / {
        return 301 /admin.html;
    }

    location = /admin {
        return 301 /admin.html;
    }

    location = /index.html {
        try_files $uri =404;
        expires -1;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /admin.html {
        try_files $uri =404;
        expires -1;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /version.json {
        try_files $uri =404;
        expires -1;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location /api {
        proxy_pass http://app-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 1y;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /admin.html;
    }
}

