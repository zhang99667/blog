name: markz-edge

services:
  edge:
    image: nginx:1.28.0-alpine
    container_name: markz-edge
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ${BLOG_APP_DIR:-/home/markz/apps/blog}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${BLOG_APP_DIR:-/home/markz/apps/blog}/dist:/usr/share/nginx/blog:ro
      - ${BLOG_APP_DIR:-/home/markz/apps/blog}/notes:/usr/share/nginx/notes:ro
      - ${BLOG_APP_DIR:-/home/markz/apps/blog}/acme:/var/www/acme:ro
      - ${ZHANGJIHAO_STATIC_ROOT:-/home/markz/code/jihao}:/usr/share/nginx/zhangjihao:ro
      - ${TLS_CERT_ROOT:-/www/server/panel/vhost/cert/39.97.237.248}:/etc/nginx/ssl:ro
      - jsonutils-static:/usr/share/nginx/html:ro
    networks:
      - jsonutils
    restart: unless-stopped

networks:
  jsonutils:
    external: true
    name: ${JSONUTILS_NETWORK:-jsonutil_app-network}

volumes:
  jsonutils-static:
    external: true
    name: ${JSONUTILS_STATIC_VOLUME:-jsonutil_frontend-static}
